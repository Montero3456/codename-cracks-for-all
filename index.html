<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Game Cracks For ALl!</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0b0f;
      color: #fff;
    }

    header {
      padding: 20px 40px 10px;
      font-size: 24px;
      font-weight: bold;
    }

    /* SEARCH BAR */
    .search-container {
      padding: 0 40px 20px;
    }

    .search-bar {
      width: 100%;
      max-width: 400px;
      padding: 12px 14px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #1a1a22;
      color: white;
      font-size: 14px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .search-bar:focus {
      box-shadow: 0 0 0 2px #4b4bff;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
      padding: 20px 40px;
    }

    .card {
      background: linear-gradient(145deg, #15151c, #0e0e13);
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      position: relative;
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 25px rgba(120, 120, 255, 0.35);
    }

    .card-content {
      padding: 15px;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .desc {
      font-size: 13px;
      opacity: 0.8;
      margin-bottom: 15px;
    }

    .btn {
      display: inline-block;
      padding: 10px 14px;
      background: #3b3bff;
      color: white;
      border-radius: 8px;
      text-decoration: none;
      font-size: 13px;
    }

    .btn:hover {
      background: #5a5aff;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<header>Game Cracks For All!</header>

<div class="search-container">
  <input 
    type="text" 
    id="search" 
    class="search-bar" 
    placeholder="Search games..."
  />
</div>

<div class="grid" id="games"></div>

<script>
let allGames = [];

const container = document.getElementById('games');
const searchInput = document.getElementById('search');

fetch('/games.json')
  .then(res => res.json())
  .then(games => {
    allGames = games;
    renderGames(games);
  });

function renderGames(games) {
  container.innerHTML = '';

  games.forEach(game => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <div class="card-content">
        <div class="title">${game.name}</div>
        <div class="desc">${game.description}</div>
        <a class="btn" href="${game.download}" target="_blank">
          Download
        </a>
      </div>
    `;

    container.appendChild(card);
  });
}

/* SEARCH LOGIC */
searchInput.addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();

  const filtered = allGames.filter(game =>
    game.name.toLowerCase().includes(query) ||
    game.description.toLowerCase().includes(query)
  );

  renderGames(filtered);
});
</script>

</body>
</html>
