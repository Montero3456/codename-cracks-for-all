<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cracks For All</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #08080c;
      color: #fff;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 42px;
      background: rgba(8, 8, 12, 0.88);
      backdrop-filter: blur(14px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.4px;
    }

    .search-bar {
      width: 280px;
      padding: 12px 14px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.12);
      outline: none;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 14px;
    }

    .search-bar:focus {
      border-color: rgba(120,120,255,0.8);
      box-shadow: 0 0 0 3px rgba(120,120,255,0.18);
    }

    .hero {
      min-height: 420px;
      display: flex;
      align-items: flex-end;
      padding: 42px;
      position: relative;
      background-size: cover;
      background-position: center;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, #08080c 5%, rgba(8,8,12,0.35) 55%, rgba(8,8,12,0.15)),
        linear-gradient(to right, rgba(8,8,12,0.95), rgba(8,8,12,0.25));
    }

    .hero-content {
      position: relative;
      max-width: 560px;
      z-index: 1;
    }

    .eyebrow {
      color: #b8b8ff;
      text-transform: uppercase;
      font-size: 12px;
      font-weight: bold;
      letter-spacing: 1.4px;
      margin-bottom: 10px;
    }

    .hero h1 {
      font-size: 48px;
      margin: 0 0 12px;
    }

    .hero p {
      font-size: 16px;
      color: rgba(255,255,255,0.82);
      line-height: 1.5;
      margin-bottom: 22px;
    }

    .btn {
      display: inline-block;
      padding: 11px 18px;
      background: #ffffff;
      color: #09090d;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      background: #dcdcff;
    }

    main {
      padding: 18px 42px 50px;
    }

    .section-title {
      font-size: 22px;
      margin: 12px 0 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
      gap: 22px;
    }

    .card {
      background: linear-gradient(145deg, rgba(255,255,255,0.09), rgba(255,255,255,0.03));
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 18px 35px rgba(0,0,0,0.45);
      transition: transform 0.22s ease, box-shadow 0.22s ease, border 0.22s ease;
    }

    .card:hover {
      transform: scale(1.045);
      border-color: rgba(150,150,255,0.55);
      box-shadow: 0 0 35px rgba(110,110,255,0.22);
    }

    .thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      display: block;
      background: #171720;
    }

    .card-content {
      padding: 15px;
    }

    .title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .desc {
      font-size: 13px;
      color: rgba(255,255,255,0.72);
      line-height: 1.4;
      min-height: 38px;
      margin-bottom: 15px;
    }

    .download {
      display: inline-block;
      padding: 9px 13px;
      background: #4f46e5;
      color: white;
      border-radius: 9px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 700;
    }

    .download:hover {
      background: #6962ff;
    }

    .empty {
      color: rgba(255,255,255,0.65);
      padding: 20px 0;
    }

    @media (max-width: 700px) {
      header {
        flex-direction: column;
        align-items: flex-start;
        gap: 14px;
        padding: 18px 22px;
      }

      .search-bar {
        width: 100%;
      }

      .hero {
        min-height: 360px;
        padding: 28px 22px;
      }

      .hero h1 {
        font-size: 34px;
      }

      main {
        padding: 18px 22px 42px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">Cracks For All</div>
  <input id="search" class="search-bar" type="text" placeholder="Search games..." />
</header>

<section id="hero" class="hero">
  <div class="hero-content">
    <div class="eyebrow">Featured Today</div>
    <h1 id="featured-title">Loading...</h1>
    <p id="featured-desc"></p>
    <a id="featured-download" class="btn" href="#" target="_blank">Download</a>
  </div>
</section>

<main>
  <h2 class="section-title">All Games</h2>
  <div id="games" class="grid"></div>
</main>

<script>
let allGames = [];

const container = document.getElementById('games');
const searchInput = document.getElementById('search');

fetch('/games.json')
  .then(res => res.json())
  .then(games => {
    allGames = games;
    renderFeatured(games);
    renderGames(games);
  })
  .catch(error => {
    console.error(error);
    container.innerHTML = '<div class="empty">Could not load games.json.</div>';
  });

function getDailyFeaturedGame(games) {
  const today = new Date();
  const start = new Date(today.getFullYear(), 0, 0);
  const diff = today - start;
  const oneDay = 1000 * 60 * 60 * 24;
  const dayOfYear = Math.floor(diff / oneDay);

  return games[dayOfYear % games.length];
}

function renderFeatured(games) {
  if (!games.length) return;

  const featured = getDailyFeaturedGame(games);

  document.getElementById('hero').style.backgroundImage =
    `url("${featured.thumbnail}")`;

  document.getElementById('featured-title').textContent = featured.name;
  document.getElementById('featured-desc').textContent = featured.description;
  document.getElementById('featured-download').href = featured.download;
}

function renderGames(games) {
  container.innerHTML = '';

  if (!games.length) {
    container.innerHTML = '<div class="empty">No games found.</div>';
    return;
  }

  games.forEach(game => {
    const card = document.createElement('div');
    card.className = 'card';

    card.innerHTML = `
      <img class="thumb" src="${game.thumbnail}" alt="${game.name} thumbnail">
      <div class="card-content">
        <div class="title">${game.name}</div>
        <div class="desc">${game.description}</div>
        <a class="download" href="${game.download}" target="_blank">
          Download
        </a>
      </div>
    `;

    container.appendChild(card);
  });
}

searchInput.addEventListener('input', (e) => {
  const query = e.target.value.toLowerCase();

  const filtered = allGames.filter(game =>
    game.name.toLowerCase().includes(query) ||
    game.description.toLowerCase().includes(query)
  );

  renderGames(filtered);
});
</script>

</body>
</html>
